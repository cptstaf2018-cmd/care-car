services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: oiluser
      POSTGRES_PASSWORD: oilpass
      POSTGRES_DB: oildb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oiluser -d oildb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://oiluser:oilpass@db:5432/oildb
      - START_SCHEDULER=false
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./backend/uploads:/app/uploads

  scheduler:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://oiluser:oilpass@db:5432/oildb
      - START_SCHEDULER=true
    depends_on:
      db:
        condition: service_healthy
    command: python -c "from app.services.scheduler_service import start_scheduler; import time; scheduler = start_scheduler(); time.sleep(10**9)"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:80"

volumes:
  pgdata:
