version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: oiluser
      POSTGRES_PASSWORD: oilpass
      POSTGRES_DB: oildb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oiluser -d oildb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host

volumes:
  pgdata:
