name: Deploy to VPS (Hostinger)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required deployment secrets
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT PROJECT_PATH BACKEND_SERVICE; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "=== [1] Pulling latest code ==="
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin master

            echo "=== [2] Building Frontend ==="
            cd frontend
            npm ci --prefer-offline
            npm run build
            echo "Frontend built successfully"

            echo "=== [3] Installing Backend dependencies ==="
            cd ../backend
            pip install -r requirements.txt -q

            echo "=== [4] Restarting Backend service ==="
            systemctl restart ${{ secrets.BACKEND_SERVICE }} || supervisorctl restart ${{ secrets.BACKEND_SERVICE }} || pm2 restart ${{ secrets.BACKEND_SERVICE }}

            echo "=== Deploy complete! ==="
